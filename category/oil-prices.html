            <div class="article-featured-body">
              <span style="color:#e8860c;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Featured</span>

          <button class="btn-load-more" style="margin-top:24px">Load More Articles</button>
        </div>

        <!-- Sidebar -->
      </div>
    </div>

    <!-- FAQ -->
    <section class="section" id="faq-section" style="display:none"><div class="container">

  <script>
    const catSlug = 'oil-prices';
    const catIcon = 'trending-up';

    // Icons
    document.getElementById('cat-icon').innerHTML = icon(catIcon, 24);

    // Category-specific content
    var catData = (typeof CATEGORY_CONTENT !== "undefined" && CATEGORY_CONTENT[catSlug]) ? CATEGORY_CONTENT[catSlug] : { articles: CATEGORY_ARTICLES, stats: [] };
    var catArticles = catData.articles || CATEGORY_ARTICLES;

    // Stat cards
    if (catData.stats && catData.stats.length > 0) {
      document.getElementById("cat-stats").innerHTML = catData.stats.map(function(s) {
        return "<div class=\"stat-box\"><div class=\"stat-box-label\">" + s.label + "</div><div class=\"stat-box-value\">" + s.value + "</div><div class=\"stat-box-sub\" style=\"color:var(--blue)\">" + s.sub + "</div></div>";
      }).join("");
    }

    // Featured article
    const feat = catArticles[0];
    document.getElementById('feat-title').textContent = feat.title;
    document.getElementById('feat-excerpt').textContent = feat.excerpt;
    document.getElementById('feat-meta').innerHTML = '<span>'+feat.author+'</span><span>'+feat.date+'</span><span>'+feat.readTime+' read</span>';
    var featLink = document.getElementById('feat-link');
    if (featLink) featLink.href = categoryArticleUrl(catArticles[0].title);

    // Article list
    document.getElementById('article-list').innerHTML = catArticles.slice(1).map(a => `
      <a href="${categoryArticleUrl(a.title)}" class="article-list-item">
        
        <div>
          <h3>${a.title}</h3>
          <div class="article-meta-sm"><span>${a.author}</span><span>${a.date}</span><span>${a.readTime}</span></div>
        </div>
      </a>
    `).join('');

    // Render FAQ if available
    if (typeof CATEGORY_FAQS !== 'undefined' && CATEGORY_FAQS[catSlug]) {
      document.getElementById('faq-section').style.display = '';
      document.getElementById('faq-heading').innerHTML = icon('zap',16) + ' Frequently Asked Questions';
      document.getElementById('faq-container').innerHTML = CATEGORY_FAQS[catSlug].map(function(f) {
        return '<div class="faq-item"><div class="faq-q">' + f.q + '</div><div class="faq-a">' + f.a + '</div></div>';
      }).join('');
    }
  </script>
