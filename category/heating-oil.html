    <!-- FAQ -->

  <script src="../js/data.js"></script>

  <script src="../js/news-feed.js"></script>
  <script>
    const catSlug = 'heating-oil';
    const catIcon = 'thermometer';

    // Icons
    document.getElementById('cat-icon').innerHTML = icon(catIcon, 24);
    
    document.getElementById('sh-market').innerHTML = icon('bar-chart',16) + ' Market Snapshot';
    document.getElementById('sh-trending').innerHTML = icon('trending-up',16) + ' Trending';

    // Category-specific content
    var catData = (typeof CATEGORY_CONTENT !== "undefined" && CATEGORY_CONTENT[catSlug]) ? CATEGORY_CONTENT[catSlug] : { articles: CATEGORY_ARTICLES, stats: [] };
    var catArticles = catData.articles || CATEGORY_ARTICLES;

    // Stat cards
    if (catData.stats && catData.stats.length > 0) {
      document.getElementById("cat-stats").innerHTML = catData.stats.map(function(s) {
        return "<div class=\"stat-box\"><div class=\"stat-box-label\">" + s.label + "</div><div class=\"stat-box-value\">" + s.value + "</div><div class=\"stat-box-sub\" style=\"color:var(--blue)\">" + s.sub + "</div></div>";
      }).join("");
    }

    // Featured article
    const feat = catArticles[0];
    document.getElementById('feat-title').textContent = feat.title;
    document.getElementById('feat-excerpt').textContent = feat.excerpt;
    document.getElementById('feat-meta').innerHTML = '<span>'+feat.author+'</span><span>'+feat.date+'</span><span>'+feat.readTime+' read</span>';
    var featLink = document.getElementById('feat-link');
    if (featLink) featLink.href = articleUrl(catArticles[0].title);

    // Article list
    document.getElementById('article-list').innerHTML = catArticles.slice(1).map(a => `
      <a href="${articleUrl(a.title)}" class="article-list-item">
        
        <div>
          <h3>${a.title}</h3>
          <div class="article-meta-sm"><span>${a.author}</span><span>${a.date}</span><span>${a.readTime}</span></div>
        </div>
      </a>
    `).join('');

    // Sidebar prices
    document.getElementById('sidebar-prices').innerHTML = COMMODITIES.slice(0,3).map((c,i) => `
      <div class="sidebar-price-row" ${i===2?'style="border:none"':''}>
        <span class="sidebar-price-name">${c.name}</span>
        <div style="text-align:right">
          <span class="sidebar-price-val">$${c.price.toFixed(2)}</span>
          <div>${priceChange(c.change, c.pct)}</div>
        </div>
      </div>
    `).join('');

    // Sidebar topics
    const allCats = Object.entries(CATEGORIES).filter(([s]) => s !== catSlug).slice(0,5);
    document.getElementById('sidebar-topics').innerHTML = allCats.map(([s,c]) => `
      <a href="${s}.html" class="sidebar-link">${icon(c.icon,16)} ${c.name}</a>
    `).join('');

    // Trending
    document.getElementById('sidebar-trending').innerHTML = TRENDING_TOPICS.map((t,i) => `

      <div class="sidebar-trending-item" ${i===4?'style="border:none"':''}>
        <span class="sidebar-trending-num">${i+1}</span>
        <span class="sidebar-trending-text">${t}</span>
      </div>
    `).join('');


    // Live headlines sidebar — GDELT
    document.getElementById('live-sidebar').style.display = '';
    document.getElementById('sh-live').innerHTML = icon('zap',14) + ' Live Headlines';
    loadLiveNews('natgas', 'sidebar-live-news', 4);

    // Render FAQ if available
    if (typeof CATEGORY_FAQS !== 'undefined' && CATEGORY_FAQS[catSlug]) {
      document.getElementById('faq-section').style.display = '';
      document.getElementById('faq-heading').innerHTML = icon('zap',16) + ' Frequently Asked Questions';
      document.getElementById('faq-container').innerHTML = CATEGORY_FAQS[catSlug].map(function(f) {
        return '<div class="faq-item"><div class="faq-q">' + f.q + '</div><div class="faq-a">' + f.a + '</div></div>';
      }).join('');
    }
  </script>
