name: Nightly Audit

on:
  schedule:
    # 2am Central = 7am UTC (CST) / 8am UTC (CDT). Use 7am UTC.
    - cron: "0 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: nightly-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild slug map from disk
        run: python3 scripts/rebuild_slug_map.py

      - name: Clean up orphan articles
        run: python3 scripts/cleanup_orphans.py || true
        # continue-on-error because "too many orphans" is a safety abort, not a failure

      - name: Refresh sitemap
        run: python3 scripts/update_sitemap.py || true

      - name: Full validation
        id: validate
        run: python3 scripts/validate.py

      - name: Commit audit results
        if: steps.validate.outcome == 'success'
        run: python3 scripts/commit_and_push.py "nightly audit"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
