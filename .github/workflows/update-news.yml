name: Update News

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch RSS and refresh breaking news
        run: python3 scripts/update_news.py || true
        # exit 1 (no new headlines) and exit 2 (network failure) both
        # continue the workflow so Claude can still process pending stubs

      - name: Upgrade stub articles with Claude
        run: python3 scripts/generate_articles.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Rebuild slug map
        run: python3 scripts/rebuild_slug_map.py

      - name: Bump sitemap
        run: python3 scripts/update_sitemap.py || true

      - name: Validate
        run: python3 scripts/validate.py

      - name: Commit and push
        run: python3 scripts/commit_and_push.py "breaking news"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
